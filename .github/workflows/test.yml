name: Test

on:
  workflow_dispatch:
    inputs:
      python-version:
        type: string
        description: 'Python interpreter version'
  workflow_call:
    inputs:
      python-version:
        type: string

jobs:
  tests:
    name: Tests py${{ inputs.python-version }}
    runs-on: ubuntu-24.04
    # Use the official Playwright image to avoid the dependency installation stalling
    # on Ubuntu, see https://github.com/microsoft/playwright/issues/34297
    container:
      # Keep the tag in sync with the playwright version resolved in package-lock.json.
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Check Playwright Browsers
        # Prebaked in the image; this just verifies the matching binary is present:
        run: npx playwright install
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "${{ inputs.python-version }}"
      - name: Pin Python version
        run: uv python pin ${{ inputs.python-version }}
      - name: Install Python packages
        run: uv sync

      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
