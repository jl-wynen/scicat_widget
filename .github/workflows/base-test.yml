name: Basic Test

on:
  workflow_dispatch:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
        description: 'Operating system'
      python-version:
        type: string
        description: 'Python interpreter version'
  workflow_call:
    inputs:
      os-variant:
        default: 'ubuntu-24.04'
        type: string
      python-version:
        type: string

jobs:
  base-tests:
    name: Basic Tests ${{ inputs.os-variant }} py${{ inputs.python-version }}
    runs-on: ${{ inputs.os-variant }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "${{ inputs.python-version }}"
      - name: Install Python packages
        run: uv sync

      - name: Run Tests
        run: uv run pytest
